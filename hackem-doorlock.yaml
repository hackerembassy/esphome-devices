esphome:
  name: hackem-doorlock
  friendly_name: "Hackem Doorlock"
  on_boot: 
    then:
      - delay: 0s
      - light.turn_on:
          id: status_light
          effect: "Blink faster"
          brightness: 100%
      - component.update: my_display

esp32:
  board: featheresp32
  framework:
    type: esp-idf

# Enable logging
logger:

globals:
  - id: ota_progress
    type: float
    restore_value: no
  - id: api_connected
    type: bool
    restore_value: no
    initial_value: 'false'

api:
  encryption:
    key: !secret doorlock_apikey
  on_client_connected:
    - delay: 0s
    - if:
        condition:
          lambda: 'return (0 == client_info.find("Home Assistant "));'
        then:
          - lambda: 'id(api_connected) = true;'
          - light.turn_on:
              id: status_light
              effect: "Ready"
              brightness: 100%
          - component.update: my_display
  on_client_disconnected: 
    then:
      - delay: 0s
      - if:
          condition:
            lambda: 'return (0 == client_info.find("Home Assistant "));'
          then:
            - lambda: 'id(api_connected) = false;'
            - light.turn_on:
                id: status_light
                effect: "Fast Pulse"
                brightness: 100%
            - component.update: my_display 

ota:
  platform: esphome
  password: !secret ota_pass
  # on_progress:
  #   then:
  #     - lambda: |-
  #         id(ota_progress) = x;
      # - component.update: my_display
  # on_begin:
  #   then:
  #     # - display.page.show: page_ota
  #     # - component.update: my_display
  # on_end:
  #   then:
  #     # - display.page.show: page_reset
  #     # - component.update: my_display
  # on_error:
  #   then:
  #     - script.execute: gui_reset

wifi:
  id: wifi_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "Hackem Fallback"
    password: !secret wifi_fallback_password
  on_connect:
    - delay: 0s
    - light.turn_on:
        id: status_light
        effect: "Fast Pulse"
        brightness: 100%
    - component.update: my_display
  on_disconnect:
    - delay: 0s
    - light.turn_on:
        id: status_light
        effect: "Blink faster"
        brightness: 100%
    - component.update: my_display

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

binary_sensor:
  - platform: status
    name: "Node Status"
    id: system_status

switch:
  - platform: gpio
    name: "Door Out Relay"
    restore_mode: ALWAYS_OFF
    id: relay
    pin:
      number: GPIO16
      inverted: false
      mode:
        open_drain: false
        output: true
    on_turn_on:
      # - script.execute: door_opened
      - delay: 3500ms
      - if:
          condition:
            switch.is_off: alwaysopen
          then:
            switch.turn_off: relay
  - platform: gpio
    name: "Door In Relay"
    restore_mode: ALWAYS_OFF
    id: relayin
    pin:
      number: GPIO5
      inverted: false
      mode:
        open_drain: false
        output: true
    on_turn_on:
      # - script.execute: door_opened
      - delay: 1000ms
      - switch.turn_off: relayin
  - platform: template
    name: "Door Out Always Open"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: True
    id: alwaysopen
    turn_on_action:
      - switch.turn_on: relay
    turn_off_action:
      - switch.turn_off: relay

button:
  - platform: restart
    id: restart_button
    name: Restart

output:
  - platform: ledc
    id: output_status
    pin: GPIO33
    
image:
  # - file: "doorlock/flag.png"
  #   id: britishflag
  #   resize: 240x135
  #   type: RGB24
  - file: mdi:check-circle
    id: check_circle
    resize: 100x100
    type: BINARY
    dither: FLOYDSTEINBERG
    transparency: chroma_key
  - file: mdi:wifi-alert
    id: wifi_alert
    resize: 100x100
    type: BINARY
    dither: FLOYDSTEINBERG
    transparency: chroma_key
  - file: mdi:alert
    id: alert
    resize: 100x100
    type: BINARY
    dither: FLOYDSTEINBERG
    transparency: chroma_key
  - file: "doorlock/bwflag.png"
    id: britishflag
    # resize: 240x135
    type: BINARY
    dither: FLOYDSTEINBERG
  - file: "doorlock/error.png"
    id: error_icon
    resize: 100x100
    type: BINARY
    transparency: chroma_key
    dither: FLOYDSTEINBERG

spi:
  clk_pin: 13
  mosi_pin: 14

time:
  - platform: sntp
    timezone: "Asia/Yerevan"
    id: sntp_time
    servers:
      - "minimi.lan"
      # - "0.pool.ntp.org"
      # - "1.pool.ntp.org"


display:
  - platform: waveshare_epaper
    cs_pin: 15
    dc_pin: 27
    reset_duration: 2ms
    busy_pin: 25
    reset_pin: 26
    id: my_display
    model: 2.13in-ttgo-dke
    # model: 2.13inv2
    full_update_every: 3
    update_interval: never
    rotation: 90°
    pages:
      - id: new_ui
        lambda: |-
          it.fill(COLOR_ON);
          it.line(0, 20, it.get_width(), 20, COLOR_OFF);   // header bar
          it.print(5, 5, id(roboto_12), COLOR_OFF, TextAlign::TOP_LEFT, "Hacker Embassy");

          if (id(api_connected)) {
              it.print(235, 5, id(roboto_12), COLOR_OFF, TextAlign::TOP_RIGHT, "Online");
              it.image(75, 25, id(check_circle), COLOR_OFF);
          } else {
              it.print(235, 5, id(roboto_12), COLOR_OFF, TextAlign::TOP_RIGHT, "Offline");
              if (id(wifi_id).is_connected()) {
                  it.print(120, 115, id(roboto_12), COLOR_OFF, TextAlign::TOP_CENTER, "Wi-Fi connected");
                  it.image(75, 25, id(alert), COLOR_OFF);
              } else {
                  it.print(120, 115, id(roboto_12), COLOR_OFF, TextAlign::TOP_CENTER, "Wi-Fi disconnected");
                  it.image(75, 25, id(wifi_alert), COLOR_OFF);
              }
          }

      - id: no_time
        lambda: |-
          it.printf(125, 65, id(clockfont), TextAlign::CENTER, "init");

      - id: has_time
        lambda: |-
          it.strftime(125, 65, id(clockfont), TextAlign::CENTER, "%H:%M", id(sntp_time).now());

      - id: page_ok
        lambda: |-
          it.image(0, 0, id(britishflag));
      - id: page_not_ok
        lambda: |-
          it.rectangle(0,  0, it.get_width(), it.get_height());
          it.rectangle(0, 20, it.get_width(), it.get_height());   // header bar
          it.print(5, 5, id(roboto_12), TextAlign::TOP_LEFT, "Hacker Embassy");

          if (id(api_connected)) {
              it.print(235, 5, id(roboto_12), TextAlign::TOP_RIGHT, "Online");
          } else {
              it.print(235, 5, id(roboto_12), TextAlign::TOP_RIGHT, "Offline");
              it.image(75, 25, id(error_icon));
              // it.printf(125, 65, id(clockfont), TextAlign::CENTER, "NOT OK");
          }

          if (id(wifi_id).is_connected()) {
              it.print(120, 115, id(roboto_12), TextAlign::TOP_CENTER, "Wi-Fi connected");
          } else {
              it.print(120, 115, id(roboto_12), TextAlign::TOP_CENTER, "Wi-Fi disconnected");
          }
  

light:
  - platform: monochromatic
    name: "Status Light"
    id: status_light
    output: output_status
    effects:
      - pulse:
          name: "Ready"
          max_brightness: 50%
          min_brightness: 15%
          transition_length:
            on_length: 2.0s
            off_length: 0.7s
          update_interval: 2.0s
      - pulse:
      - pulse:
          name: "Very Fast Pulse"
          transition_length: 0.2s
          update_interval: 0.2s
      - pulse:
          name: "Fast Pulse"
          transition_length: 0.3s
          update_interval: 0.3s
      - pulse:
          name: "Slow Pulse"
          transition_length: 0.6s
          update_interval: 0.6s
      - strobe:
          name: Blink
          colors:
            - state: true
              brightness: 100%
              duration: 100ms
            - state: false
              duration: 100ms
      - strobe:
          name: Blink faster
          colors:
            - state: true
              brightness: 100%
              duration: 50ms
            - state: false
              duration: 50ms

font:
  - file: "gfonts://Anton"
    id: clockfont
    size: 96
  - file: "gfonts://Roboto"
    id: roboto_12
    size: 12
  - file: "gfonts://Roboto"
    id: roboto_36
    size: 36
  - file: "gfonts://Roboto"
    id: roboto_48
    size: 48

web_server:
  port: 80
  local: true
  auth:
    username: admin
    password: !secret web_server_password
