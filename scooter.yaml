esphome:
  name: scooter
  friendly_name: scooter
  # on_boot: 
  #   then:
  #     - light.turn_on: status_led

esp32:
  board: m5stack-atom
  framework:
    type: arduino

light:
  # - platform: fastled_clockless
  #   chipset: WS2812B
  #   pin: 27
  #   num_leds: 1
  #   rgb_order: GRB
  #   id: status_led
  #   name: ${friendly_name} Light
  #   effects:
  #     - random:
  #     - flicker:
  #     - addressable_rainbow:
  - platform: monochromatic
    name: "LCD backlight"
    output: output_backlight
    restore_mode: ALWAYS_ON

external_components:
  - source: github://oxan/esphome-stream-server

stream_server:

spi:
  clk_pin: 19
  mosi_pin: 23
  miso_pin: 12
  interface: hardware

output:
  - platform: ledc
    pin: GPIO22
    id: output_backlight

display:
  - platform: st7735
    model: "INITR_BLACKTAB"
    cs_pin: 25
    dc_pin: 33
    reset_pin: 21
    show_test_card: true
    rotation: 0
    device_width: 128
    device_height: 128
    col_start: 0
    row_start: 32
    eight_bit_color: false
    update_interval: 5s
    lambda: |-
      auto size = id(homepage_qr).get_size() * 6; // Multiply by scale
      auto x = (it.get_width() / 2) - (size / 2);
      auto y = (it.get_height() / 2) - (size / 2);
      it.qr_code(x, y, id(homepage_qr), Color(255,255,255), 6);
      it.line(0, 0, 128, 0);



qr_code:
  - id: homepage_qr
    value: dipier.ro

font:
  - file:
      type: gfonts
      family: Roboto
      weight: 900
    id: roboto_16
    size: 16

uart:
  tx_pin: GPIO26
  rx_pin: GPIO32
  baud_rate: 115200
  stop_bits: 1
  data_bits: 8
  parity: NONE
  # debug:
  #   direction: BOTH
  #   dummy_receiver: false
  #   after:
  #     timeout: 1ms
  #   sequence:
  #     - lambda: UARTDebug::log_string(direction, bytes);

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key_scooter

ota:
  - platform: esphome
    password: !secret ota_pass_scooter

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Scooter Fallback Hotspot"
    password: !secret wifi_fallback_scooter

captive_portal:

switch:
  - platform: template
    id: locked
    optimistic: True
    name: Locked
    turn_on_action: 
      then:
        - uart.write: [0x55, 0xAA, 0x4, 0x20, 0x3, 0x70, 0x1, 0x0, 0x67, 0xFF]
    turn_off_action: 
      then:
        - uart.write: [0x55, 0xAA, 0x4, 0x20, 0x3, 0x71, 0x1, 0x0, 0x66, 0xFF]


