esphome:
  name: ble-proxy-1
  friendly_name: ble-proxy-1

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key_ble

ota:
  - platform: esphome
    password: !secret ota_pass_ble

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Ble-Proxy-1 Fallback Hotspot"
    password: !secret wifi_fallback_password

bluetooth_proxy:
  active: False

esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: False