#     away_config:
#       default_target_temperature_low: 10 °C
#       default_target_temperature_high: 14 °C


climate:
  - platform: thermostat
    name: "Thermostat"
    sensor: current_temperature
    min_heating_off_time: 120s
    min_heating_run_time: 120s
    min_idle_time: 0s
    heat_overrun: 0.2 °C
    heat_deadband: 0.2 °C
    heat_action:
      - switch.turn_on: heater
    idle_action:
      - switch.turn_off: heater
    default_preset: Default
    on_boot_restore_from: memory
    preset:
      - name: Away
        default_target_temperature_low: 18 °C
        mode: HEAT
      - name: Comfort
        default_target_temperature_low: 23 °C
        mode: HEAT
      - name: Default
        default_target_temperature_low: 21 °C
        mode: HEAT
      - name: "Away for Long"
        default_target_temperature_low: 10 °C
        mode: HEAT
      - name: "I am German"
        default_target_temperature_low: 19 °C
        mode: HEAT
      
    