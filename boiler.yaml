esphome:
  name: "boiler"
  friendly_name: "Boiler"

esp8266:
  board: esp12e
  restore_from_flash: true

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key_boiler

ota:
  platform: esphome
  password: !secret ota_pass_ble

debug:
  update_interval: 10s

text_sensor:
  - platform: debug
    device:
      name: "Device Info"
    reset_reason:
      name: "Reset Reason"
  - platform: wifi_info
    ip_address:
      name: ESP IP Address
      address_0:
        name: ESP IP Address 0
      address_1:
        name: ESP IP Address 1
      address_2:
        name: ESP IP Address 2
      address_3:
        name: ESP IP Address 3
      address_4:
        name: ESP IP Address 4
    ssid:
      name: ESP Connected SSID
    bssid:
      name: ESP Connected BSSID
    mac_address:
      name: ESP Mac Wifi Address
    scan_results:
      name: ESP Latest Scan Results
    dns_address:
      name: ESP DNS Address

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esphome-Boiler"
    password: !secret wifi_fallback_password

captive_portal:

sensor:
  - platform: wifi_signal
    name: "WiFi Signal Sensor"
    update_interval: 60s
  - platform: homeassistant
    id: current_temperature
    entity_id: sensor.avg_temperature
    internal: true
  - platform: uptime
    name: Uptime

switch:
  - platform: gpio
    pin: 4
    # inverted: true
    name: "Thermostat relay"
    id: heater
    restore_mode: ALWAYS_OFF

button:
  - platform: safe_mode
    name: Thermostat Safe Mode
  - platform: restart
    name: Thermostat Restart

# climate:
#   - platform: bang_bang
#     name: "Thermostat"
#     sensor: current_temperature
