bk72xx:
  board: cbu
  framework:
    version: latest

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Power Meter Fallback Hotspot"
    password: !secret wifi_fallback_password

esphome:
  name: hackem-powermeter
  friendly_name: "Hackem Power Meter"

api:
  encryption:
    key: !secret doorlock_apikey

ota:
  platform: esphome
  password: !secret ota_pass

status_led:
  pin:
    number: P15
    inverted: true

uart:
  baud_rate: 4800
  rx_pin: RX1
  tx_pin: TX1
  stop_bits: 1
  id: uart_bus


logger:
  baud_rate: 0

button:
  - platform: restart
    name: Restart
  - platform: template
    name: "Cut off the power"
    on_press:
      - switch.turn_off: switch_relay
  - platform: template
    name: "Bring power back"
    on_press:
      - switch.turn_on: switch_relay

sensor:
  - platform: template
    id: apparent
    name: Apparent power
    device_class: "power"
    state_class: "measurement"
    unit_of_measurement: "VA"
    accuracy_decimals: 1
    filters:
      - exponential_moving_average
  - platform: template
    id: reactive
    name: Reactive power
    device_class: "power"
    state_class: "measurement"
    unit_of_measurement: "VAR"
    accuracy_decimals: 1
    filters:
      - exponential_moving_average
  - platform: template
    id: pf
    name: Power factor
    device_class: "power"
    state_class: "measurement"
    accuracy_decimals: 2
    filters:
      - exponential_moving_average
  - platform: bl0942
    voltage_reference: 15956    # DPS 21
    current_reference: 128700   # DPS 22 * 10
    power_reference: 320.83     # DPS 23 / 10 (flashed: 315.7)
    energy_reference: 2753.74   # DPS 24 (flashed: 2709)
    uart_id: uart_bus
    voltage:
      name: 'BL0942 Voltage'
      id: voltage
      filters:
        - exponential_moving_average
    current:
      name: 'BL0942 Current'
      id: current
      filters:
        - exponential_moving_average
        # - multiply: 1.335
    power:
      name: 'BL0942 Power'
      id: active
      filters:
        - multiply: -1
        - exponential_moving_average
      #   multiply: -1.335
      on_raw_value:
        - sensor.template.publish:
            id: apparent
            state: !lambda 'return id(voltage).raw_state * id(current).raw_state;'
        - sensor.template.publish:
            id: reactive
            state: !lambda 'return sqrt(pow(id(apparent).raw_state, 2) - pow((id(active).raw_state * -1), 2));'
        - sensor.template.publish:
            id: pf
            state: !lambda 'return (id(active).raw_state * -1) / id(apparent).raw_state;'
    energy:
      name: 'BL0942 Energy'
      accuracy_decimals: 2
      filters:
        - throttle: 12s
    frequency:
      name: "BL0942 Frequency"
      accuracy_decimals: 2
      filters:
        - exponential_moving_average
    update_interval: 0.8s

time:
  - platform: homeassistant

binary_sensor:
  - platform: gpio
    pin:
      number: P17
      inverted: true
      mode:
        input: true
        pullup: true
    name: Button
    filters:
      - delayed_on: 10ms
    internal: true
    on_click:
    - min_length: 1000ms
      max_length: 5000ms
      then:
        - switch.toggle: switch_relay
    - min_length: 50ms
      max_length: 1000ms
      then:
        - homeassistant.event:
            event: esphome.button_pressed
            data:
                message: Power Meter Button Clicked

output:
  - platform: gpio
    pin:
      number: P24
    id: 'relay_on'
  - platform: gpio
    pin:
      number: P26
    id: 'relay_off'
  - platform: gpio
    pin:
      number: P9
      inverted: true
    id: 'led'
  - platform: template
    id: bridge_relay
    type: binary
    write_action:
      - if:
          condition:
            lambda: return (state == 1);
          then:
            - output.turn_on: led
            - output.turn_off: relay_off
            - output.turn_on: relay_on
            - delay: 80ms
            - output.turn_off: relay_on
            - light.turn_on:
                id: btn_led
                effect: "None"
          else:
            - light.turn_off:
                id: btn_led
            - output.turn_off: relay_on
            - output.turn_on: relay_off
            - delay: 80ms
            - output.turn_off: relay_off
            - light.turn_off: btn_led
            - light.turn_on:
                id: btn_led
                effect: "Blink"

switch:
  - platform: output
    id: switch_relay
    name: "Switch"
    output: 'bridge_relay'
    restore_mode: RESTORE_DEFAULT_ON
    disabled_by_default: true

light:
  - platform: binary
    name: "Button LED"
    id: btn_led
    output: led
    internal: true
    effects:
      - strobe:
          name: Blink
          colors:
            - state: true
              duration: 200ms
            - state: false
              duration: 200ms